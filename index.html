<!doctype html>
<html lang="eu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HiTZordu</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">HiTZ</p>
        <h1>HiTZordu</h1>
      </div>
      <div class="top-actions">
        <button id="new-meeting" type="button">Bilera berria</button>
      </div>
    </header>

    <main class="app-shell">
      <aside class="side-panel">
        <section class="panel-section">
          <h2>Bilerak</h2>
          <div id="meetings" class="meetings"></div>
        </section>

        <section id="participant-panel" class="panel-section">
          <h2>Parte-hartzailea</h2>
          <label>
            Izena
            <input id="participant-name" placeholder="Adib. Olatz">
          </label>
          <button id="add-participant" type="button">Gehitu</button>
          <div id="participants" class="participants"></div>
        </section>

        <section id="best-panel" class="panel-section">
          <h2>Tarte onenak</h2>
          <ol id="best-slots" class="best-slots"></ol>
          <button id="export-ics" type="button">Egutegira esportatu</button>
        </section>

        <section id="slot-details-panel" class="panel-section">
          <h2>Orduaren xehetasuna</h2>
          <p id="slot-details-title" class="muted">Hautatu gelaxka bat.</p>
          <div id="slot-details" class="slot-details"></div>
        </section>
      </aside>

      <section id="setup-panel" class="setup-panel" aria-label="Bilera konfiguratu">
        <div class="setup-inner">
          <h2>Sortu bilera</h2>
          <div class="setup-grid">
            <label>
              Bileraren izena
              <input id="meeting-title" placeholder="Adib. Latxa artikuluaren jarraipena">
            </label>
            <label>
              Iraupena
              <select id="duration">
                <option value="30">30 min</option>
                <option value="60" selected>60 min</option>
                <option value="90">90 min</option>
              </select>
            </label>
            <label>
              Hasiera
              <select id="start-time"></select>
            </label>
            <label>
              Amaiera
              <select id="end-time"></select>
            </label>
          </div>

          <div class="mode-switch" role="group" aria-label="Bilera mota">
            <button class="active" data-meeting-mode="dated" type="button">Data zehatzak</button>
            <button data-meeting-mode="weekly" type="button">Bilera orokorra</button>
          </div>

          <div id="dated-chooser" class="date-picker">
            <div class="calendar-toolbar">
              <button id="prev-month" type="button" aria-label="Aurreko hilabetea">&lt;</button>
              <h3 id="calendar-title"></h3>
              <button id="next-month" type="button" aria-label="Hurrengo hilabetea">&gt;</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div id="selected-dates" class="selected-dates"></div>
          </div>

          <div id="weekly-chooser" class="weekday-picker" hidden>
            <div id="weekday-choices" class="weekday-choices"></div>
          </div>

          <button id="create-meeting" class="primary-action" type="button">Bilera sortu</button>
        </div>
      </section>

      <section id="schedule-panel" class="schedule-panel" aria-label="Erabilgarritasun sarea">
        <div class="grid-toolbar">
          <div>
            <h2 id="schedule-title">Aukeratu orduak</h2>
            <p id="active-person-label"></p>
          </div>
          <button id="clear-meeting" type="button">Erantzunak garbitu</button>
        </div>
        <div class="legend" aria-label="Egoeren azalpena">
          <span><i class="legend-dot available-dot"></i>Bai</span>
          <span><i class="legend-dot maybe-dot"></i>Behar izanez gero</span>
          <span><i class="legend-dot empty-dot"></i>Hutsik</span>
        </div>
        <div class="availability-layout">
          <section class="availability-column" aria-label="Nire erabilgarritasuna">
            <h3>Nire egutegia</h3>
            <div id="personal-grid" class="availability-grid"></div>
          </section>
          <section class="availability-column" aria-label="Taldearen emaitza">
            <h3>Taldearen egutegia</h3>
            <div id="summary-grid" class="availability-grid"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
