<!doctype html>
<html lang="eu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HiTZordu</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">HiTZ</p>
        <h1>HiTZordu</h1>
      </div>
      <div class="top-actions">
        <button id="new-meeting" type="button">Bilera berria</button>
      </div>
    </header>

    <main class="app-shell">
      <aside class="side-panel">
        <section class="panel-section">
          <h2>Bilerak</h2>
          <div id="meetings" class="meetings"></div>
        </section>

        <section id="participant-panel" class="panel-section">
          <h2>Parte-hartzailea</h2>
          <label>
            Izena
            <input id="participant-name" placeholder="Adib. Olatz">
          </label>
          <button id="add-participant" type="button">Gehitu</button>
          <div id="participants" class="participants"></div>
        </section>

        <section id="best-panel" class="panel-section">
          <h2>Tarte onenak</h2>
          <ol id="best-slots" class="best-slots"></ol>
          <button id="export-ics" type="button">Egutegira esportatu</button>
        </section>
      </aside>

      <section id="setup-panel" class="setup-panel" aria-label="Bilera konfiguratu">
        <div class="setup-inner">
          <h2>Sortu bilera</h2>
          <div class="setup-grid">
            <label>
              Bileraren izena
              <input id="meeting-title" placeholder="Adib. Latxa artikuluaren jarraipena">
            </label>
            <label>
              Iraupena
              <select id="duration">
                <option value="30">30 min</option>
                <option value="60" selected>60 min</option>
                <option value="90">90 min</option>
              </select>
            </label>
            <label>
              Hasiera
              <select id="start-time"></select>
            </label>
            <label>
              Amaiera
              <select id="end-time"></select>
            </label>
          </div>

          <div class="date-row">
            <label>
              Eguna
              <input id="meeting-date" type="date">
            </label>
            <button id="add-date" type="button">Eguna gehitu</button>
          </div>
          <div id="selected-dates" class="selected-dates"></div>
          <button id="create-meeting" class="primary-action" type="button">Bilera sortu</button>
        </div>
      </section>

      <section id="schedule-panel" class="schedule-panel" aria-label="Erabilgarritasun sarea">
        <div class="grid-toolbar">
          <div>
            <h2 id="schedule-title">Aukeratu orduak</h2>
            <p id="active-person-label"></p>
          </div>
          <button id="clear-meeting" type="button">Erantzunak garbitu</button>
        </div>
        <div class="legend" aria-label="Egoeren azalpena">
          <span><i class="legend-dot available-dot"></i>Bai</span>
          <span><i class="legend-dot maybe-dot"></i>Behar izanez gero</span>
          <span><i class="legend-dot empty-dot"></i>Hutsik</span>
        </div>
        <div id="availability-grid" class="availability-grid"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
